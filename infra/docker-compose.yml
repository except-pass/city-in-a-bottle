services:
  postgres:
    image: postgres:16
    container_name: agent_economy_postgres
    environment:
      POSTGRES_USER: agent_economy
      POSTGRES_PASSWORD: agent_economy_dev
      POSTGRES_DB: agent_economy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_economy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Zulip stack - message bus with UI, persistence, and user management
  zulip:
    image: zulip/docker-zulip:latest
    container_name: agent_economy_zulip
    environment:
      # Database connection - using DB_* vars for bootstrap phase
      DB_HOST: postgresql-zulip
      DB_HOST_PORT: "5432"
      DB_USER: zulip
      # Redis
      SETTING_REDIS_HOST: redis-zulip
      # RabbitMQ
      SETTING_RABBITMQ_HOST: rabbitmq-zulip
      SETTING_RABBITMQ_PASSWORD: zulip_rabbitmq_dev
      # Memcached - single line
      SETTING_CACHES: '{"default": {"BACKEND": "django_bmemcached.memcached.BMemcached", "LOCATION": "memcached-zulip:11211"}}'
      # Server settings - use HTTPS port since Zulip forces HTTPS redirect
      SETTING_EXTERNAL_HOST: localhost:8443
      # Accept internal Docker container name for agent-to-zulip communication
      SETTING_ALLOWED_HOSTS: "['localhost:8443', 'zulip']"
      SETTING_ZULIP_ADMINISTRATOR: admin@agent-economy.local
      # Disable email - not needed for agent communication
      SETTING_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      SETTING_NOREPLY_EMAIL_ADDRESS: noreply@agent-economy.local
      SETTING_ADD_TOKENS_TO_NOREPLY_ADDRESS: "False"
      # Security - dev settings
      SECRETS_secret_key: "dev-secret-key-change-in-production-1234567890"
      SECRETS_rabbitmq_password: zulip_rabbitmq_dev
      SECRETS_postgres_password: zulip_dev
      SECRETS_redis_password: zulip_redis_dev
      # Disable push notifications
      SETTING_PUSH_NOTIFICATION_BOUNCER_URL: ""
      # SSL - auto-generate self-signed certs for dev
      SSL_CERTIFICATE_GENERATION: self-signed
      # Skip dictionary files (not needed for dev, avoids postgres setup complexity)
      SETTING_POSTGRESQL_MISSING_DICTIONARIES: "True"
      # Organization settings
      SETTING_DEFAULT_REALM_NAME: "City in a Bottle"
      SETTING_ZULIP_ORG_NAME: "City in a Bottle"
    ports:
      - "8080:80"     # Web UI and API
      - "8443:443"    # HTTPS (self-signed)
    volumes:
      - zulip_data:/data
    depends_on:
      postgresql-zulip:
        condition: service_healthy
      redis-zulip:
        condition: service_started
      rabbitmq-zulip:
        condition: service_started
      memcached-zulip:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  postgresql-zulip:
    image: zulip/zulip-postgresql:14
    container_name: agent_economy_postgresql_zulip
    environment:
      POSTGRES_USER: zulip
      POSTGRES_PASSWORD: zulip_dev
      POSTGRES_DB: zulip
    volumes:
      - postgresql_zulip_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zulip"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-zulip:
    image: redis:7-alpine
    container_name: agent_economy_redis_zulip
    command: ["redis-server", "--requirepass", "zulip_redis_dev"]
    volumes:
      - redis_zulip_data:/data

  rabbitmq-zulip:
    image: rabbitmq:3-management
    container_name: agent_economy_rabbitmq_zulip
    environment:
      RABBITMQ_DEFAULT_USER: zulip
      RABBITMQ_DEFAULT_PASS: zulip_rabbitmq_dev
    volumes:
      - rabbitmq_zulip_data:/var/lib/rabbitmq

  memcached-zulip:
    image: memcached:1.6-alpine
    container_name: agent_economy_memcached_zulip
    command: ["-m", "256"]

  forgejo:
    image: codeberg.org/forgejo/forgejo:8
    container_name: agent_economy_forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__database__PATH=/data/gitea/forgejo.db
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__repository__DEFAULT_BRANCH=main
      # Security: require PR for main branch changes
      - FORGEJO__repository__DEFAULT_PUSH_CREATE_PRIVATE=false
    ports:
      - "3000:3000"   # Web UI
      - "2222:2222"   # SSH for git
    volumes:
      - forgejo_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agent runner - runs agents in isolated containers
  # Usage: docker compose run --rm agent agent_alpha
  agent:
    build:
      context: ../
      dockerfile: infra/docker/agent.Dockerfile
    volumes:
      # Mount just the credentials file (read-only)
      - ${HOME}/.claude/.credentials.json:/claude-auth/.credentials.json:ro
      # Mount agent's private directory for persistent memory
      - ../.data/agents:/app/agents
      # Mount the repo so agents can read/modify code and make PRs (Bill of Rights #9)
      - ../:/repo
    environment:
      # Zulip message bus (uses HTTPS with insecure mode for self-signed cert)
      - ZULIP_URL=https://zulip:443
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agent_economy
      - POSTGRES_USER=agent_economy
      - POSTGRES_PASSWORD=agent_economy_dev
    depends_on:
      postgres:
        condition: service_healthy
      zulip:
        condition: service_healthy
    # Don't start by default - run manually
    profiles:
      - agent

volumes:
  postgres_data:
  forgejo_data:
  zulip_data:
  postgresql_zulip_data:
  redis_zulip_data:
  rabbitmq_zulip_data:
