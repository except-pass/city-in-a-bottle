# NATS Server Configuration for City in a Bottle

# Server identification
server_name: agent_economy_nats

# Client connections
port: 4222

# HTTP monitoring
http_port: 8222

# JetStream configuration
jetstream {
    # Storage directory
    store_dir: /data/jetstream

    # Maximum memory storage
    max_mem: 1G

    # Maximum file storage
    max_file: 10G
}

# Logging
debug: false
trace: false
logtime: true

# Connection limits
max_connections: 100
max_payload: 1MB

# Write deadline for slow consumers
write_deadline: 10s
